<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JarenHavell.com</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #fff;
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }
    header {
      background: #28a745;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    header h1 a {
      color: #fff;
      text-decoration: none;
    }
    nav {
      display: flex;
      gap: 1.5rem;
    }
    nav a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }
    nav a:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
      text-decoration: none;
    }
    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    article {
      margin-bottom: 2.5rem;
      padding-bottom: 2.5rem;
      border-bottom: 1px solid #eee;
    }
    article:last-child {
      border-bottom: none;
    }
    article h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    article h2 a {
      color: #222;
      text-decoration: none;
    }
    article h2 a:hover {
      text-decoration: underline;
    }
    article time {
      font-size: 0.85rem;
      color: #666;
      display: block;
      margin-bottom: 0.6rem;
    }
    article p {
      color: #444;
      margin-bottom: 0.75rem;
    }
    article .read-more {
      font-size: 0.9rem;
      color: #135e96;
      text-decoration: none;
    }
    article .read-more:hover {
      text-decoration: underline;
    }
    footer {
      border-top: 1px solid #ddd;
      padding: 1.25rem 2rem;
      font-size: 0.85rem;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="index.html">JarenHavell.com</a></h1>
    <nav>
      <a href="index.html">Blog</a>
      <a href="/about/">About Me</a>
    </nav>
  </header>

  <main>
    <article>
      <h2> you found a cat.</h2>
      
      <p>you found a cat. .<a href="/about/">take it home</a> <a href="index.html">walk away.</a></p>

    </article>

  <footer>
    <p>Copyright Jaren Havell. You wouldn't download a car.</p>
  </footer>
</body>
</html>
